!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname HOP20B
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
clock timezone AST -4
no ip icmp rate-limit unreachable
ip cef
!
!
no ip dhcp use vrf connected
ip dhcp excluded-address 192.168.101.1 192.168.101.20
!
ip dhcp pool HOME_LAN
   network 192.168.101.0 255.255.255.0
   default-router 192.168.101.1 
   dns-server 8.8.8.8 
   option 4 ip 123.123.123.123 
   option 42 ip 123.123.123.123 
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface Tunnel0
 ip address 172.16.3.2 255.255.255.252
 tunnel source Serial0/0
 tunnel destination 172.16.1.1
!
interface FastEthernet0/0
 ip address 192.168.101.1 255.255.255.0
 ip nat inside
 ip virtual-reassembly
 duplex auto
 speed auto
!
interface Serial0/0
 ip address 172.16.1.5 255.255.255.252
 encapsulation frame-relay
 no fair-queue
 clock rate 2000000
 frame-relay class SHAPE_256K
 frame-relay traffic-shaping
 frame-relay map ip 172.16.1.6 102 broadcast
 frame-relay interface-dlci 102
!
interface FastEthernet0/1
 ip address dhcp
 ip nat outside
 ip virtual-reassembly
 duplex auto
 speed auto
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/3
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/4
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/5
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router bgp 53
 no synchronization
 bgp log-neighbor-changes
 network 100.84.0.0 mask 255.255.255.0
 network 172.16.1.4 mask 255.255.255.252
 network 192.168.101.0
 neighbor 100.84.0.2 remote-as 21
 neighbor 172.16.1.6 remote-as 41
 no auto-summary
!
ip forward-protocol nd
ip route 0.0.0.0 0.0.0.0 172.16.1.6
!
!
no ip http server
no ip http secure-server
ip nat inside source list 100 interface FastEthernet0/0 overload
!
!
map-class frame-relay SHAPE_256K
 frame-relay cir 192000
access-list 100 permit ip 192.168.101.0 0.0.0.255 any
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
ntp server 123.123.123.123
!
end
