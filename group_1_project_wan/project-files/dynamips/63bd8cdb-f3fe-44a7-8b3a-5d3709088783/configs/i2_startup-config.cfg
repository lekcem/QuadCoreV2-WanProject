!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname Champ-Fleurs
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 ip address 10.10.2.1 255.255.255.0
 duplex auto
 speed auto
!
interface Serial0/0
 ip address 172.16.2.5 255.255.255.252
 ip access-group 102 out
 no fair-queue
 clock rate 2000000
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/3
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/4
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/5
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router bgp 47
 no synchronization
 bgp router-id 47.47.47.47
 bgp log-neighbor-changes
 network 10.10.2.0 mask 255.255.255.0
 neighbor 172.16.2.6 remote-as 42
 no auto-summary
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
map-class frame-relay SHAPE_256K
 frame-relay cir 192000
access-list 102 permit tcp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq ftp-data
access-list 102 permit tcp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq ftp
access-list 102 permit tcp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq bgp
access-list 102 permit icmp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255
access-list 102 permit udp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq bootps
access-list 102 permit udp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq bootpc
access-list 102 permit udp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq ntp
access-list 102 permit udp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq domain
access-list 102 permit tcp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq domain
access-list 102 permit tcp 10.10.2.0 0.0.0.255 192.168.102.0 0.0.0.255 eq 22
access-list 102 deny   ip any any
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
