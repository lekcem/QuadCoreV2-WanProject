!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname Hop21
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
interface FastEthernet0/0
 no ip address
 ip access-group 101 in
 ip access-group 101 out
 shutdown
 duplex auto
 speed auto
!
interface Serial0/0
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/3
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/4
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/5
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
access-list 101 permit tcp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq www
access-list 101 permit tcp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq 443
access-list 101 permit tcp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq bgp
access-list 101 permit icmp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255
access-list 101 permit udp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq bootps
access-list 101 permit udp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq bootpc
access-list 101 remark Allow NTP
access-list 101 permit udp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq ntp
access-list 101 permit udp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq domain
access-list 101 permit tcp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq domain
access-list 101 permit tcp 192.168.100.0 0.0.0.255 192.168.102.0 0.0.0.255 eq 22
access-list 101 deny   ip any any
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
